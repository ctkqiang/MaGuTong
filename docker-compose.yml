# ============================================================
# 马股通 - Docker Compose
# Author: 钟智强
# ============================================================
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f app    # Follow app logs
#   docker compose down           # Stop all services
#   docker compose down -v        # Stop and remove volumes
# ============================================================

services:
  # ---- MySQL 8.0 ----
  mysql:
    image: mysql:8.0
    container_name: magutong-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: bursa_data
      TZ: Asia/Kuala_Lumpur
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "--silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- BursaScrapper Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magutong-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: bursa_data
      SERVER_PORT: 8080
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
    driver: local
